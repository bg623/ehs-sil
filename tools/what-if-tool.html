<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>What-If 假设分析 · 在线工具 · EHS-SIL</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#0d2836;--accent:#b8860b;--bg:#e8e1d4;--text:#2d3436;--font-sans:-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif}
body{font-family:var(--font-sans);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.6}
.container{max-width:1000px;margin:0 auto;padding:0 1.5rem}
.header{background:linear-gradient(135deg,#0d2836,#1a4b5c);color:#fff;padding:2rem 0 2.5rem;text-align:center}
.header h1{font-size:1.5rem;font-weight:700;margin-bottom:.2rem}
.header p{color:rgba(255,255,255,.7);font-size:.82rem}
.back{color:var(--accent);font-size:.78rem;text-decoration:none}
.section{background:#fff;border-radius:10px;border:1px solid #e3ddd2;padding:1.25rem;margin:1rem 0}
.section h2{font-size:.95rem;color:var(--primary);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.3rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-bottom:.3rem}
.form-row-5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:.4rem;margin-bottom:.3rem}
.form-group{margin-bottom:.4rem}
.form-group label{display:block;font-size:.7rem;color:#555;margin-bottom:.1rem;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.4rem .45rem;border:1.5px solid #e3ddd2;border-radius:5px;font-size:.78rem;outline:none;font-family:var(--font-sans)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{min-height:40px;resize:vertical}
.btn{padding:.4rem .8rem;border:none;border-radius:5px;font-size:.75rem;font-weight:500;cursor:pointer;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:.25rem .5rem;font-size:.7rem}
.btn-danger{background:#dc2626;color:#fff}
.toolbar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem}
.toolbar-right{margin-left:auto;display:flex;gap:.3rem}
.data-table{width:100%;border-collapse:collapse;font-size:.72rem}
.data-table th{background:var(--primary);color:#fff;padding:.3rem .25rem;text-align:left;font-weight:500;white-space:nowrap}
.data-table td{padding:.3rem .25rem;border-bottom:1px solid #e3ddd2;vertical-align:top}
.data-table tr:hover{background:#fafaf5}
.risk-badge{display:inline-block;padding:.05rem .3rem;border-radius:3px;font-size:.62rem;font-weight:600}
.risk-low{background:#dcfce7;color:#16a34a}
.risk-med{background:#fef9c3;color:#a16207}
.risk-high{background:#fee2e2;color:#dc2626}
.empty-state{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:.82rem}
.empty-state .icon{font-size:2rem;margin-bottom:.3rem}
.rpn-preview{display:inline-block;padding:.35rem .5rem;border-radius:4px;font-size:.78rem;font-weight:600;text-align:center}
#gateContainer{max-width:450px;margin:2rem auto}
.legend{display:flex;gap:.5rem;flex-wrap:wrap;font-size:.68rem;color:#999;margin-top:.4rem}
@media(max-width:480px){.form-row,.form-row-3,.form-row-5{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><div class="container">
<a href="risk-analysis.html" class="back">&larr; 返回工具集</a>
<h1>&#10067; What-If 假设分析</h1>
<p>系统化"如果…怎么办"问题链，匹配外企PRA标准模板</p>
</div></div>

<div class="container">
<div id="gateContainer"></div>
<div id="toolContent" style="display:none">

<div class="section">
<h2>&#128203; 项目信息</h2>
<div class="form-row">
<div class="form-group"><label>标题</label><input id="projTitle" placeholder="过程风险分析(PRA) - What-If"></div>
<div class="form-group"><label>装置/区域</label><input id="projUnit" placeholder="例：甲醇储罐区"></div>
</div>
<div class="form-row">
<div class="form-group"><label>流程/工艺</label><input id="projProcess" placeholder="例：甲醇卸车+储存"></div>
<div class="form-group"><label>日期</label><input id="projDate" type="date"></div>
</div>
<div class="form-row">
<div class="form-group"><label>分析原因</label><input id="projReason" placeholder="例：技术变更/MoC/新装置"></div>
<div class="form-group"><label>分析范围</label><input id="projScope" placeholder="例：从卸车台到储罐"></div>
</div>
</div>

<div class="section">
<h2>&#10133; 添加偏差</h2>
<div class="form-group"><label>What-If 问题/偏差 *</label><input id="wiDeviation" placeholder="例：如果甲醇泵出口阀门意外关闭"></div>
<div class="form-row">
<div class="form-group"><label>原因</label><textarea id="wiCause" rows="2" placeholder="例：阀门故障/操作失误"></textarea></div>
<div class="form-group"><label>后果</label><textarea id="wiConsequence" rows="2" placeholder="例：憋压→密封泄漏→甲醇外泄"></textarea></div>
</div>
<div class="form-row-5">
<div class="form-group"><label>L 可能性</label><select id="wiL"><option value="1">1-极低</option><option value="2">2-低</option><option value="3" selected>3-中</option><option value="4">4-高</option><option value="5">5-极高</option></select></div>
<div class="form-group"><label>C/P 人员</label><select id="wiCP"><option value="1">1-轻微</option><option value="2">2-一般</option><option value="3" selected>3-严重</option><option value="4">4-重大</option><option value="5">5-特大</option></select></div>
<div class="form-group"><label>C/E 环境</label><select id="wiCE"><option value="1">1-轻微</option><option value="2">2-一般</option><option value="3" selected>3-严重</option><option value="4">4-重大</option><option value="5">5-特大</option></select></div>
<div class="form-group"><label>C/A 资产</label><select id="wiCA"><option value="1">1-轻微</option><option value="2">2-一般</option><option value="3" selected>3-严重</option><option value="4">4-重大</option><option value="5">5-特大</option></select></div>
<div class="form-group"><label>Risk = L×MAX</label><div id="riskPreview" class="rpn-preview risk-med" style="width:100%;padding:.35rem">9</div></div>
</div>
<div class="form-row">
<div class="form-group"><label>屏障/现有措施</label><textarea id="wiBarrier" rows="2" placeholder="例：高报联锁、安全阀、操作规程"></textarea></div>
<div class="form-group"><label>升级因素</label><textarea id="wiEscalation" rows="2" placeholder="例：培训不足、维护不到位"></textarea></div>
</div>
<div class="form-group"><label>建议措施</label><textarea id="wiAction" rows="2" placeholder="例：增加低流量联锁报警"></textarea></div>
<div class="form-row">
<div class="form-group"><label>状态</label><select id="wiStatus"><option value="">-</option><option value="待处理">待处理</option><option value="进行中">进行中</option><option value="已完成">已完成</option></select></div>
<div class="form-group"><label>R2 残余风险 = L2×MAX(P2,E2,A2)</label><div id="risk2Preview" class="rpn-preview risk-low" style="width:100%;padding:.35rem">2</div></div>
</div>
<div class="form-row-5">
<div class="form-group"><label>L2</label><select id="wiL2"><option value="1" selected>1-极低</option><option value="2">2-低</option><option value="3">3-中</option><option value="4">4-高</option><option value="5">5-极高</option></select></div>
<div class="form-group"><label>C/P2</label><select id="wiCP2"><option value="1" selected>1-轻微</option><option value="2">2-一般</option><option value="3">3-严重</option><option value="4">4-重大</option><option value="5">5-特大</option></select></div>
<div class="form-group"><label>C/E2</label><select id="wiCE2"><option value="1" selected>1-轻微</option><option value="2">2-一般</option><option value="3">3-严重</option><option value="4">4-重大</option><option value="5">5-特大</option></select></div>
<div class="form-group"><label>C/A2</label><select id="wiCA2"><option value="1" selected>1-轻微</option><option value="2">2-一般</option><option value="3">3-严重</option><option value="4">4-重大</option><option value="5">5-特大</option></select></div>
<div class="form-group"></div>
</div>
<div style="display:flex;gap:.5rem;margin-top:.3rem">
<button class="btn btn-primary" onclick="addWI()">&#10133; 添加</button>
</div>
</div>

<div class="section">
<div class="toolbar">
<h2 style="margin-bottom:0">&#128221; 偏差列表</h2>
<span id="wiCount" style="font-size:.72rem;color:#999">0 项</span>
<div class="toolbar-right">
<button class="btn btn-sm btn-outline" onclick="saveWI()">&#128190; 保存</button>
<button class="btn btn-sm btn-outline" onclick="loadWI()">&#128194; 载入</button>
<button class="btn btn-sm btn-accent" onclick="exportWI()">&#128203; 导出CSV</button>
<button class="btn btn-sm btn-danger" onclick="if(confirm('清空？')){wiData.items=[];renderWI();}">&#128465; 清空</button>
</div>
</div>
<div id="wiTable"><div class="empty-state"><div class="icon">&#128221;</div><p>暂无偏差数据</p></div></div>
<div class="legend">风险等级: <span class="risk-badge risk-low">低1-4</span><span class="risk-badge risk-med">中5-9</span><span class="risk-badge risk-high">高10-25</span> | Risk = L × MAX(P,E,A)</div>
</div>

</div></div>

<footer style="text-align:center;padding:1rem;font-size:.7rem;color:#999"><p>&copy; 2026 EHS-SIL</p></footer>

<script src="../js/auth.js"></script>
<script>
var isVip = renderSimpleGate('gateContainer');
if (isVip) document.getElementById('toolContent').style.display = 'block';

var wiData = { items: [] };
document.getElementById('projDate').valueAsDate = new Date();

function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function calcRisk(L,CP,CE,CA){return L*Math.max(CP,CE,CA)}
function riskClass(r){return r<=4?'risk-low':r<=9?'risk-med':'risk-high'}

function updateRisks(){
    var L=+document.getElementById('wiL').value, CP=+document.getElementById('wiCP').value,
        CE=+document.getElementById('wiCE').value, CA=+document.getElementById('wiCA').value;
    var r=calcRisk(L,CP,CE,CA);
    var el=document.getElementById('riskPreview');
    el.textContent=r; el.className='rpn-preview '+riskClass(r);
}
['wiL','wiCP','wiCE','wiCA'].forEach(function(id){
    document.getElementById(id).onchange=updateRisks;
});

function updateRisks2(){
    var L=+document.getElementById('wiL2').value, CP=+document.getElementById('wiCP2').value,
        CE=+document.getElementById('wiCE2').value, CA=+document.getElementById('wiCA2').value;
    var r=calcRisk(L,CP,CE,CA);
    document.getElementById('risk2Preview').textContent=r;
    document.getElementById('risk2Preview').className='rpn-preview '+riskClass(r);
}
['wiL2','wiCP2','wiCE2','wiCA2'].forEach(function(id){
    document.getElementById(id).onchange=updateRisks2;
});

function addWI(){
    var dev=document.getElementById('wiDeviation').value.trim();
    if(!dev){alert('请输入What-If问题');return;}
    var L=+document.getElementById('wiL').value,CP=+document.getElementById('wiCP').value,
        CE=+document.getElementById('wiCE').value,CA=+document.getElementById('wiCA').value;
    var L2=+document.getElementById('wiL2').value,CP2=+document.getElementById('wiCP2').value,
        CE2=+document.getElementById('wiCE2').value,CA2=+document.getElementById('wiCA2').value;
    wiData.items.push({
        id:Date.now(),deviation:dev,cause:document.getElementById('wiCause').value.trim(),
        consequence:document.getElementById('wiConsequence').value.trim(),
        L,CP,CE,CA,risk:calcRisk(L,CP,CE,CA),
        barrier:document.getElementById('wiBarrier').value.trim(),
        escalation:document.getElementById('wiEscalation').value.trim(),
        action:document.getElementById('wiAction').value.trim(),
        status:document.getElementById('wiStatus').value,
        L2,CP2,CE2,CA2,risk2:calcRisk(L2,CP2,CE2,CA2)
    });
    document.getElementById('wiDeviation').value='';['wiCause','wiConsequence','wiBarrier','wiEscalation','wiAction'].forEach(function(id){document.getElementById(id).value=''});
    document.getElementById('wiStatus').value='';document.getElementById('wiDeviation').focus();
    renderWI();
}

function deleteWI(id){wiData.items=wiData.items.filter(function(i){return i.id!==id});renderWI();}

function renderWI(){
    var items=wiData.items;document.getElementById('wiCount').textContent=items.length+' 项';
    if(!items.length){document.getElementById('wiTable').innerHTML='<div class="empty-state"><div class="icon">&#128221;</div><p>暂无偏差数据</p></div>';return;}
    items.sort(function(a,b){return b.risk-a.risk});
    var h='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>#</th><th>偏差/What-If</th><th>原因</th><th>后果</th><th style="width:28px">L</th><th style="width:28px">P</th><th style="width:28px">E</th><th style="width:28px">A</th><th style="width:45px">风险</th><th>屏障</th><th>残余风险</th><th>建议</th><th>状态</th><th style="width:30px"></th></tr></thead><tbody>';
    items.forEach(function(i,idx){
        h+='<tr><td>'+(idx+1)+'</td><td>'+esc(i.deviation)+'</td><td>'+esc(i.cause)+'</td><td>'+esc(i.consequence)+'</td>'+
            '<td style="text-align:center">'+i.L+'</td><td style="text-align:center">'+i.CP+'</td><td style="text-align:center">'+i.CE+'</td><td style="text-align:center">'+i.CA+'</td>'+
            '<td><span class="risk-badge '+riskClass(i.risk)+'">'+i.risk+'</span></td>'+
            '<td>'+esc(i.barrier)+'</td>'+
            '<td><span class="risk-badge '+riskClass(i.risk2||0)+'">'+(i.risk2||'-')+'</span></td>'+
            '<td>'+esc(i.action)+'</td><td>'+(i.status||'')+'</td>'+
            '<td><button class="btn btn-sm btn-danger" onclick="deleteWI('+i.id+')">&#10005;</button></td></tr>';
    });
    h+='</tbody></table></div>';
    document.getElementById('wiTable').innerHTML=h;
}

function saveWI(){
    var d={title:document.getElementById('projTitle').value,unit:document.getElementById('projUnit').value,process:document.getElementById('projProcess').value,date:document.getElementById('projDate').value,items:wiData.items};
    localStorage.setItem('ehs_sil_whatif',JSON.stringify(d));
    alert('已保存');
}
function loadWI(){
    var raw=localStorage.getItem('ehs_sil_whatif');
    if(!raw){alert('暂无保存数据');return;}
    try{var d=JSON.parse(raw);document.getElementById('projTitle').value=d.title||'';document.getElementById('projUnit').value=d.unit||'';document.getElementById('projProcess').value=d.process||'';document.getElementById('projDate').value=d.date||'';wiData.items=d.items||[];renderWI();alert('已载入');}catch(e){alert('读取失败');}
}
function exportWI(){
    if(!wiData.items.length){alert('暂无数据');return;}
    var bom='\uFEFF',rows=[['偏差/What-If','原因','后果','L','C/P','C/E','C/A','风险','屏障','升级因素','建议','状态','L2','C/P2','C/E2','C/A2','残余风险']];
    wiData.items.forEach(function(i){
        rows.push([i.deviation,i.cause,i.consequence,i.L,i.CP,i.CE,i.CA,i.risk,i.barrier,i.escalation,i.action,i.status,i.L2,i.CP2,i.CE2,i.CA2,i.risk2||'']);
    });
    var csv=bom+rows.map(function(r){return r.map(function(c){return '"'+(c||'').toString().replace(/"/g,'""')+'"'}).join(',')}).join('\n');
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download='WhatIf_'+(document.getElementById('projTitle').value||'report')+'.csv';
    a.click();
}
</script>
</body>
</html>
