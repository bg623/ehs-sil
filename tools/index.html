<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EHS-SIL 工具库 — 外企EHS实战工具搜索引擎，777+ 份经过外企验证的EHS管理工具">
    <title>工具库 · EHS-SIL</title>
    <link rel="stylesheet" href="../css/tools.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a4b5c'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='system-ui' font-weight='bold'>ES</text></svg>">
</head>
<body>
    <header class="tools-header">
        <div class="container">
            <nav class="tools-nav">
                <a href="../index.html" class="tools-logo">
                    <span class="logo-mark">EHS</span><span class="logo-sep">-</span><span class="logo-sil">SIL</span>
                </a>
                <a href="../index.html#products" class="back-link">← 返回首页</a>
            </nav>
            <div class="tools-hero">
                <span class="tools-badge">外企EHS工具箱</span>
                <h1 class="tools-title">工具库搜索引擎</h1>
                <p class="tools-subtitle">
                    搜索 <strong id="toolCount">777</strong> 份经过外企验证的EHS管理工具、模板、检查表、培训课件
                </p>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索工具名称、关键词如：BBS、HAZOP、JSA、ISO 45001..." autofocus>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="filter-bar" id="filterBar">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">全部</button>
                </div>
                <div class="filter-group secondary" id="categoryFilters"></div>
                <div class="filter-group">
                    <span class="result-count" id="resultCount">777 个工具</span>
                </div>
            </div>

            <div class="tools-grid" id="toolsGrid">
                <div class="loading">加载工具库...</div>
            </div>
        </div>
    </main>

    <footer class="tools-footer">
        <div class="container">
            <p>所有工具均来自 <a href="../index.html#products">外企EHS工具箱</a> 知识星球 · 加入即可获取全部工具</p>
        </div>
    </footer>

    <script src="../js/tools.js"></script>
</body>
</html>
