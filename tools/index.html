<!DOCTYPE html>
<html lang="zh-CN">

            <style>
            .cat-overview{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:1.5rem 0 0}

            .cat-count{font-size:.7rem;color:var(--accent);font-weight:600}
            </style>
</head>
<body>
    <header class="tools-header">
        <div class="container">
            <nav class="tools-nav">
                <a href="../index.html" class="tools-logo">

                    <input type="text" id="searchInput" class="search-input" placeholder="搜索工具名称、关键词如：BBS、HAZOP、JSA、ISO 45001..." autofocus>
                </div>
            </div>
            <div class="cat-overview">
<button class="cat-card" data-cat="培训课件" onclick="filterByCategory('培训课件')"><span class="cat-emoji">📚</span><span class="cat-name">培训课件</span><span class="cat-count">63</span></button>

<button class="cat-card" data-cat="行为安全" onclick="filterByCategory('行为安全')"><span class="cat-emoji">🛡️</span><span class="cat-name">行为安全</span><span class="cat-count">39</span></button>

    </header>

    <main>

            <div class="filter-bar" id="filterBar">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">全部</button>
                </div>
                <div class="filter-group secondary" id="categoryFilters"></div>
                <div class="filter-group">
                    <span class="result-count" id="resultCount">735 个工具</span>
                </div>
            </div>

            <div class="tools-grid" id="toolsGrid">

        </div>

    <footer class="tools-footer">
        <div class="container">
            <p>所有工具均来自 <a href="../index.html#products">外企EHS工具箱</a> 知识星球 · 加入即可获取全部工具</p>

    </footer>

    <script src="../js/tools.js"></script>
