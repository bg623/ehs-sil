<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EHS法规速查 · 中国+国际标准 · EHS-SIL</title>

<style>
:root{--bg:#f5f1ea;--bg-card:#f5f2eb;--primary:#0d2836;--primary-dark:#071d27;--accent:#b8860b;--accent-light:#f5ede2;--text:#2d3436;--text-secondary:#4a555a;--text-muted:#95a5a6;--border:#d6d0c4;--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
.container{max-width:1000px;margin:0 auto;padding:0 1.5rem}
.header{background:var(--primary-dark);color:#fff;padding:2rem 0 3rem;text-align:center}
.header h1{font-size:1.8rem;font-weight:700;margin-bottom:.3rem}
.header p{color:rgba(255,255,255,.7);font-size:.9rem;margin-bottom:1.5rem}
.back{color:var(--accent);font-size:.82rem;text-decoration:none;display:inline-block;margin-bottom:.5rem}
.search-box{position:relative;max-width:500px;margin:0 auto}
.search-box input{width:100%;padding:.7rem 1rem .7rem 2.5rem;border:2px solid transparent;border-radius:8px;font-size:.9rem;background:rgba(255,255,255,.12);color:#fff;outline:none;transition:.3s}
.search-box input:focus{background:rgba(255,255,255,.18);border-color:var(--accent)}
.search-box input::placeholder{color:rgba(255,255,255,.4)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4)}
.tabs{display:flex;gap:.5rem;justify-content:center;padding:1rem 0}
.tab{padding:.3rem .8rem;border-radius:15px;font-size:.78rem;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;transition:.2s}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tab:hover{border-color:var(--primary)}
.list{display:flex;flex-direction:column;gap:.5rem;padding-bottom:2rem}
.item{background:#fff;border:1px solid var(--border-light);border-radius:8px;padding:1rem 1.25rem;transition:.2s}
.item:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.item.hidden{display:none}
.item h3{font-size:.9rem;color:var(--primary-dark);margin-bottom:.2rem;font-weight:600}
.item .meta{font-size:.75rem;color:var(--text-muted);margin-bottom:.3rem}
.item .meta span{margin-right:.5rem}
.item .desc{font-size:.8rem;color:var(--text-secondary);line-height:1.5}
.tag{display:inline-block;font-size:.65rem;padding:.1rem .4rem;border-radius:3px;margin-right:.3rem;font-weight:500}
.tag-cn{background:#dbeafe;color:#1e40af}
.tag-intl{background:#fef3c7;color:#92400e}
.tag-law{background:#fee2e2;color:#dc2626}
.tag-standard{background:#dcfce7;color:#16a34a}
.count{font-size:.78rem;color:var(--text-muted);text-align:center;padding:.5rem}
@media(max-width:480px){.header h1{font-size:1.4rem}.tabs{flex-wrap:wrap}}

            .dl-btn{display:inline-block;padding:.15rem .5rem;font-size:.7rem;background:var(--primary);color:#fff;border:none;border-radius:3px;cursor:pointer;transition:all .2s}
            .dl-btn:hover{background:var(--primary-dark)}
            .item{position:relative}
</style>
<script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?10000726865";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s);})();</script></head>
<body>
<div class="header"><div class="container">
<a href="../index.html" class="back">&larr; 返回首页</a>
<h1>&#128214; EHS法规速查</h1>
<p>中国法律法规 + 国际标准 · EHS从业者必备参考</p>
<div class="search-box">
<span class="search-icon">&#128269;</span>
<input type="text" id="searchInput" placeholder="搜索法规名称、编号、关键词..." oninput="filterRegs()">
</div>
</div></div>

<div class="container">
<div class="tabs" id="tabs">
<button class="tab active" onclick="setTab('all',this)">全部</button>
<button class="tab" onclick="setTab('中国',this)">&#128205; 中国法规</button>
<button class="tab" onclick="setTab('国际',this)">&#127758; 国际标准</button>
</div>
<div class="count" id="count"></div>
<div class="list" id="list"></div>
</div>

<script>
var data = [];
fetch('../data/regulations.json').then(function(r){return r.json()}).then(function(d){
    data = d.regulations;
    render();
    document.getElementById('count').textContent = data.length + ' 条法规标准';
});

var currentTab = 'all';
var currentQuery = '';

function setTab(tab, btn){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    btn.classList.add('active');
    currentTab = tab;
    filterRegs();
}

function filterRegs(){
    currentQuery = document.getElementById('searchInput').value.trim().toLowerCase();
    render();
}


function downloadReg(r){
    var c = '法规名称: ' + r.cn + '\n英文名称: ' + r.en + '\n标准编号: ' + r.num + '\n发布机构: ' + r.auth + '\n发布时间: ' + r.yr + '年\n法规类型: ' + r.type + '\n所属分类: ' + r.cat + '\n国家/地区: ' + r.c + '\n\n说明：完整法规文件请参考官方发布渠道\n下载日期: ' + new Date().toLocaleDateString('zh-CN');
    var blob = new Blob([c], {type:'text/plain;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = (r.num || r.cn) + '.txt';
    a.click(); URL.revokeObjectURL(url);
}

function render(){
    var results = data;
    if(currentTab !== 'all') results = results.filter(function(r){return (currentTab === '中国' && r.c === '中国') || (currentTab === '国际' && r.c === '国际')});
    if(currentQuery) results = results.filter(function(r){
        var c = (r.cn + ' ' + r.en + ' ' + r.num + ' ' + r.cat + ' ' + r.auth).toLowerCase();
        return c.indexOf(currentQuery) !== -1;
    });
    document.getElementById('count').textContent = results.length + ' / ' + data.length + ' 条法规';
    document.getElementById('list').innerHTML = results.map(function(r, idx){
        var tag = r.c === '中国' ? '<span class="tag tag-cn">中国</span>' : '<span class="tag tag-intl">国际</span>';
        var typeTag = '';
        if(r.type.indexOf('法') !== -1) typeTag = '<span class="tag tag-law">' + r.type + '</span>';
        else if(r.type.indexOf('标准') !== -1) typeTag = '<span class="tag tag-standard">' + r.type + '</span>';
        var dl = '<button class="dl-btn" onclick="downloadReg(results[' + idx + '])">下载</button>';
        return '<div class="item"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><h3>' + r.cn + '</h3><div class="meta">' + tag + typeTag + '<span>' + r.num + '</span><span>' + r.auth + '</span><span>' + r.yr + '年</span></div><div class="desc">' + r.en + '</div></div><div style="flex-shrink:0;margin-left:.5rem">' + dl + '</div></div></div>';
    }).join('');
}
</script>

<footer style="text-align:center;padding:2rem;font-size:.78rem;color:var(--text-muted);border-top:1px solid var(--border)">
    <p>&copy; 2026 EHS-SIL &middot; 法规仅供参考，请以官方正式文本为准</p>
</footer>
</body>
</html>
