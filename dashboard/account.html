<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的账户 · EHS-SIL</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a4b5c'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='system-ui' font-weight='bold'>ES</text></svg>">
<style>
:root{--primary:#0d2836;--primary-dark:#071d27;--accent:#b8860b;--bg:#e8e1d4;--text:#2d3436;--text-secondary:#4a555a;--text-muted:#7f8c8d;--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:1.5rem}
.header{background:linear-gradient(135deg,#0d2836,#1a4b5c);color:#fff;padding:2rem 0;text-align:center}
.header h1{font-size:1.3rem;font-weight:700;margin-bottom:.2rem}
.header p{color:rgba(255,255,255,.7);font-size:.8rem;margin-top:.2rem}
.back{color:var(--accent);font-size:.78rem;text-decoration:none;display:block;margin-bottom:.3rem}
.card{background:#fff;border-radius:10px;border:1px solid #e3ddd2;padding:1.5rem;margin:1rem 0}
.card h2{font-size:1rem;color:var(--primary);font-weight:600;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.status-badge{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600}
.status-vip{background:#fef3c7;color:#b8860b}
.status-normal{background:#e8e8e8;color:#888}
.status-active{background:#dcfce7;color:#16a34a}
.btn{display:inline-block;padding:.5rem 1rem;border:none;border-radius:6px;font-size:.8rem;font-weight:500;cursor:pointer;transition:.2s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:#a0750a}
.btn-outline{border:1.5px solid var(--primary);color:var(--primary);background:transparent}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:.35rem .7rem;font-size:.75rem}
.btn-block{width:100%;text-align:center}
.vip-input{display:flex;gap:.4rem;margin-top:.5rem}
.vip-input input{flex:1;padding:.5rem .6rem;border:1.5px solid #ddd;border-radius:6px;font-size:.82rem;outline:none}
.vip-input input:focus{border-color:var(--accent)}
.msg{padding:.5rem;border-radius:6px;font-size:.78rem;margin-bottom:.6rem;text-align:center;display:none}
.msg.error{background:#fee2e2;color:#dc2626;display:block}
.msg.success{background:#dcfce7;color:#16a34a;display:block}
.tool-links{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.tool-link{display:flex;align-items:center;gap:.3rem;padding:.4rem .6rem;font-size:.78rem;color:var(--text-secondary);text-decoration:none;border:1px solid #e3ddd2;border-radius:6px;transition:.2s}
.tool-link:hover{border-color:var(--accent);color:var(--primary)}
.tool-link .icon{font-size:.9rem}
.tool-link .badge{font-size:.6rem;padding:0 .25rem;border-radius:2px}
.badge-free{background:#dcfce7;color:#16a34a}
.badge-vip{background:#fef3c7;color:#b8860b}
.footer-actions{display:flex;gap:.5rem;justify-content:center;margin:1rem 0}
@media(max-width:480px){.tool-links{grid-template-columns:1fr}}
</style>

<script src="../js/auth.js"></script>
<script>
(function(){
    var card = document.getElementById('vipStatusCard');
    var icon = document.getElementById('vipIcon');
    var title = document.getElementById('vipTitle');
    var desc = document.getElementById('vipDesc');
    var actions = document.getElementById('vipActions');
    if (!card) return;
    if (isVip()) {
        icon.innerHTML = '&#127881;';
        title.textContent = 'VIP 会员';
        title.style.color = '#b8860b';
        desc.textContent = '您已激活VIP权限，可以使用所有高级工具';
        actions.innerHTML = '<div style="margin-top:.5rem"><a href="../tools/risk-analysis.html" style="display:inline-block;padding:.5rem 1rem;background:#0d2836;color:#fff;border-radius:6px;text-decoration:none;font-size:.8rem">访问VIP工具</a></div>';
        card.style.borderColor = '#fde68a';
        card.style.background = '#fefce8';
    } else {
        icon.innerHTML = '&#128274;';
        title.textContent = '普通用户';
        desc.textContent = '输入激活码解锁全部高级工具';
        actions.innerHTML = '<div style="margin-top:.5rem"><a href="register.html" style="display:inline-block;padding:.5rem 1rem;background:#b8860b;color:#fff;border-radius:6px;text-decoration:none;font-size:.8rem">激活VIP &rarr;</a></div>';
    }
})();
</script>
</body>
</html>
