function switchTab(tab){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});

}

    {icon:'рҹҸӯ',name:'е»әзӯ‘/е·ҘзЁӢEHS',desc:'ж–Ҫе·Ҙе®үе…Ё'},
    {icon:'рҹҢҚ',name:'ESGдёҺEHS',desc:'еҸҜжҢҒз»ӯеҸ‘еұ•'},
    {icon:'рҹҢҠ',name:'еҚұеҢ–е“Ғз®ЎзҗҶ',desc:'GHS/REACH'},
    {icon:'рҹ§ұ',name:'LOTOдёҠй”ҒжҢӮзүҢ',desc:'иғҪйҮҸйҡ”зҰ»'},
];

// Writing templates
var templates = {
    'дәӢж•…еӨҚзӣҳзұ»': 'ж ҮйўҳпјҡГ—Г—дәӢж•…еӨҚзӣҳеҸҠеӨ–дјҒеҰӮдҪ•йў„йҳІ
ејҖзҜҮпјҡдёҖдёӘд»ӨдәәйңҮжғҠзҡ„ж•°жҚ®/зңҹе®һжЎҲдҫӢ
дәӢж•…еӣһйЎҫпјҡж—¶й—ҙзәҝ/еҺҹеӣ еҲҶжһҗ
еӨ–дјҒи§Ҷи§’пјҡеҗҢзұ»й—®йўҳзҡ„йҳІиҢғжҺӘж–Ҫ
жҖ»з»“пјҡз»ҷиҜ»иҖ…зҡ„5жқЎе»әи®®',
    'ж–№жі•и®әзұ»': 'ж ҮйўҳпјҡГ—Г—ж–№жі•е…Ёи§ЈжһҗпјҡеӨ–дјҒEHSзҡ„е®һжҲҳеә”з”Ё
д»Җд№ҲжҳҜпјҡе®ҡд№ү+ж ёеҝғеҺҹзҗҶ
дёәд»Җд№ҲиҰҒз”Ёпјҡд»·еҖји§’еәҰеҲҶжһҗ
жҖҺд№Ҳз”ЁпјҡжӯҘйӘӨ+жЎҲдҫӢ
вҖңеҸЈиҜҖвҖқпјҡдёҖеҸҘиҜқжҖ»з»“',

з—ӣзӮ№пјҡдҪ жҳҜеҗҰйҒҮеҲ°иҝҮиҝҷдәӣй—®йўҳ

иҺ·еҸ–ж–№ејҸпјҡеҠ е…Ҙе·Ҙе…·з®ұ',

function renderIdeas(){
    var html = '';
    hotTopics.forEach(function(t){
        html += '<div class="idea-card" onclick="startIdea(\''+t.name.replace(/'/g,"\\'")+'\')"><div class="icon">'+t.icon+'</div><div class="name">'+t.name+'</div><div class="desc">'+t.desc+'</div></div>';
    });
    document.getElementById('ideaGrid').innerHTML = html;
}

function renderTemplates(){
    var html = '';
    for(var key in templates){
        html += '<div class="card"><h3>'+key+'</h3><div class="tmpl-preview">'+templates[key].split('\n').join('<br>')+'</div><button class="btn btn-primary btn-sm" style="margin-top:.5rem" onclick="useTemplate(\''+key+'\')">дҪҝз”ЁжӯӨжЁЎжқҝ</button></div>';
    }
    document.getElementById('templateGrid').innerHTML = html;
}

function renderTopics(){
    var html = '';
    topics.forEach(function(t,i){
        var status = t.status || 'draft';
        var badge = status === 'published' ? '<span class="badge badge-published">е·ІеҸ‘еёғ</span>' : (status === 'scheduled' ? '<span class="badge badge-scheduled">е·ІжҺ’жңҹ</span>' : '<span class="badge badge-draft">иҚүзЁҝ</span>');
        html += '<div class="list-item"><div><div class="title">'+t.title+'</div><div class="meta">'+t.type+' В· '+t.date+' '+badge+'</div></div><button class="del" onclick="delTopic('+i+')">еҲ йҷӨ</button></div>';
    });
    document.getElementById('topicList').innerHTML = html || '<p style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0">иҝҳжІЎжңүйҖүйўҳ</p>';
    document.getElementById('topicCount').textContent = '('+topics.length+')';
}

function renderCalendar(){
    var now = new Date();
    var year = now.getFullYear();
    var month = now.getMonth();
    var first = new Date(year, month, 1).getDay();
    var days = new Date(year, month+1, 0).getDate();
    var html = '<div class="cal-header"><h3>'+year+'е№ҙ'+(month+1)+'жңҲ</h3></div><div class="cal-grid">';
    var labels = ['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'];
    labels.forEach(function(l){html += '<div class="day-label">'+l+'</div>'});
    for(var i=0;i<first;i++){html += '<div></div>'}
    for(var d=1;d<=days;d++){
        var cls = 'day';
        if(d === now.getDate()) cls += ' today';
        var has = false;
        calendar.forEach(function(p){if(p.date === year+'-'+(month+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0')) has = true;});
        if(has) cls += ' has-post';
        html += '<div class="'+cls+'">'+d+'</div>';
    }
    html += '</div>';
    document.getElementById('calendarView').innerHTML = html;
    // Calendar posts list
    var postHtml = '<h2 style="font-size:.9rem;color:var(--primary-dark);margin:.5rem 0">еҪ“жңҲжҺ’жңҹ</h2>';
    calendar.sort(function(a,b){return a.date > b.date ? 1 : -1});
    calendar.forEach(function(p,i){
        var badge = p.status === 'published' ? '<span class="badge badge-published">е·ІеҸ‘еёғ</span>' : (p.status === 'scheduled' ? '<span class="badge badge-scheduled">е·ІжҺ’жңҹ</span>' : '<span class="badge badge-draft">иҚүзЁҝ</span>');
        postHtml += '<div class="list-item"><div><div class="title">'+p.title+'</div><div class="meta">'+p.platform+' В· '+p.date+' '+badge+'</div></div><button class="del" onclick="delCal('+i+')">еҲ йҷӨ</button></div>';
    });
    document.getElementById('calPosts').innerHTML = postHtml || '<p style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0">жҡӮж— жҺ’жңҹ</p>';
}

function renderStats(){
    var totalTopics = topics.length;
    var published = topics.filter(function(t){return t.status === 'published'}).length;
    var monthTopics = topics.filter(function(t){return t.date && t.date.indexOf(new Date().toLocaleDateString('zh-CN').slice(0,7)) !== -1}).length;
    var platforms = {};
    calendar.forEach(function(p){platforms[p.platform] = (platforms[p.platform]||0)+1});
    var platformHtml = Object.keys(platforms).map(function(k){return k+':'+platforms[k]}).join(' В· ');
    document.getElementById('statGrid').innerHTML = '<div class="stat-card"><span class="num">'+totalTopics+'</span><span class="label">жҖ»йҖүйўҳ</span></div><div class="stat-card"><span class="num">'+published+'</span><span class="label">е·ІеҸ‘еёғ</span></div><div class="stat-card"><span class="num">'+monthTopics+'</span><span class="label">жң¬жңҲж–°еўһ</span></div><div class="stat-card"><span class="num" style="font-size:1rem">'+platformHtml+'</span><span class="label">е№іеҸ°еҲҶеёғ</span></div>';
    // Recent posts
    var recentHtml = '';
    calendar.filter(function(p){return p.status === 'published'}).sort(function(a,b){return a.date < b.date ? 1 : -1}).slice(0,10).forEach(function(p){
        recentHtml += '<div class="list-item"><div><div class="title">'+p.title+'</div><div class="meta">'+p.platform+' В· '+p.date+'</div></div></div>';
    });
    document.getElementById('recentPosts').innerHTML = recentHtml || '<p style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0">е°ҡж— еҸ‘еёғи®°еҪ•</p>';
}

function startIdea(topic){
    document.getElementById('topicTitle').value = topic + 'пјҡд»ҺеӨ–дјҒи§Ҷи§’ж·ұеәҰи§Јжһҗ';
    switchTab('topics');
    document.getElementById('topicOutline').focus();
    window.scrollTo({top:200,behavior:'smooth'});
}

function saveTopic(){
    var title = document.getElementById('topicTitle').value.trim();
    var type = document.getElementById('topicType').value;
    var outline = document.getElementById('topicOutline').value.trim();
    if(!title){alert('иҜ·иҫ“е…Ҙж Үйўҳ');return;}
    topics.unshift({
        id: Date.now(), title: title, type: type, outline: outline,
        date: new Date().toLocaleDateString('zh-CN'), status: 'draft'
    });
    localStorage.setItem('ehs_topics', JSON.stringify(topics));
    renderTopics();
    document.getElementById('topicTitle').value='';
    document.getElementById('topicOutline').value='';
}

function delTopic(i){topics.splice(i,1);localStorage.setItem('ehs_topics',JSON.stringify(topics));renderTopics();}

function sendToDistributor(){
    var title = document.getElementById('topicTitle').value.trim();
    if(!title){alert('е…ҲеЎ«еҶҷж Үйўҳ');return;}
    saveTopic();
    window.open('../tools/content-repurposer.html?title='+encodeURIComponent(title), '_blank');
}

function useTemplate(name){
    var t = templates[name];
    document.getElementById('topicTitle').value = name.replace('зұ»','') + 'зұ»ж–Үз« еӨ„зҗҶпјҡд»ҺеӨ–дјҒи§’еәҰи§Јжһҗ';
    switchTab('topics');
    document.getElementById('topicOutline').focus();
    alert('жЁЎжқҝе·ІеӨҮз”ЁпјҢеҸӮиҖғз»“жһ„пјҡ\n'+t.substring(0,100)+'...');
}

function addCalendar(){
    var title = document.getElementById('calTitle').value.trim();
    var platform = document.getElementById('calPlatform').value;
    var date = document.getElementById('calDate').value;
    var status = document.getElementById('calStatus').value;
    if(!title||!date){alert('иҜ·еЎ«еҶҷе®Ңж•ҙ');return;}
    calendar.push({title:title,platform:platform,date:date,status:status});
    localStorage.setItem('ehs_calendar',JSON.stringify(calendar));
    renderCalendar();
    document.getElementById('calTitle').value='';
}

function delCal(i){calendar.splice(i,1);localStorage.setItem('ehs_calendar',JSON.stringify(calendar));renderCalendar();}

// Init
renderIdeas(); renderTemplates(); renderTopics(); renderCalendar(); renderStats();
</script>
</body>
</html>
